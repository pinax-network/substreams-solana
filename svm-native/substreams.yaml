specVersion: v0.1.0
package:
  name: svm_native
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: Native System Program events for Solana blockchains.
  image: ../image.png

imports:
  # SQL Sink Substreams
  database_changes: ../spkg/substreams-sink-database-changes-v4.0.0.spkg
  sql: ../spkg/substreams-sink-sql-protodefs-v1.0.7.spkg

  # Substreams
  native_token: ../spkg/native-token-v0.2.2.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/db_svm_native.wasm

modules:
  - name: db_out
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: native_token:map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: solana
