syntax = "proto3";
package marinade.v1;

message Events {
  repeated Transaction transactions = 1;
}

message Transaction {
  bytes signature = 1;
  bytes fee_payer = 2;
  repeated bytes signers = 3;
  uint64 fee = 4;
  uint64 compute_units_consumed = 5;
  repeated Instruction instructions = 6;
  repeated Log logs = 7;
}

message Instruction {
  bytes program_id = 1;
  uint32 stack_height = 2;
  oneof instruction {
    DepositInstruction deposit = 3;
    DepositStakeAccountInstruction deposit_stake_account = 4;
    LiquidUnstakeInstruction liquid_unstake = 5;
    AddLiquidityInstruction add_liquidity = 6;
    RemoveLiquidityInstruction remove_liquidity = 7;
    OrderUnstakeInstruction order_unstake = 8;
    ClaimInstruction claim = 9;
    WithdrawStakeAccountInstruction withdraw_stake_account = 10;
  }
}

message DepositInstruction {
  uint64 lamports = 1;
}

message DepositStakeAccountInstruction {}

message LiquidUnstakeInstruction {
  uint64 msol_amount = 1;
}

message AddLiquidityInstruction {
  uint64 lamports = 1;
}

message RemoveLiquidityInstruction {
  uint64 tokens = 1;
}

message OrderUnstakeInstruction {
  uint64 msol_amount = 1;
}

message ClaimInstruction {}

message WithdrawStakeAccountInstruction {
  uint64 msol_amount = 1;
  uint32 stake_index = 2;
  uint32 validator_index = 3;
}

message Log {
  bytes program_id = 1;
  uint32 invoke_depth = 2;
  oneof log {
    DepositEvent deposit = 3;
    DepositStakeAccountEvent deposit_stake_account = 4;
    LiquidUnstakeEvent liquid_unstake = 5;
    AddLiquidityEvent add_liquidity = 6;
    RemoveLiquidityEvent remove_liquidity = 7;
    WithdrawStakeAccountEvent withdraw_stake_account = 8;
  }
}

message DepositEvent {
  bytes state = 1;
  bytes sol_owner = 2;
  uint64 sol_swapped = 3;
  uint64 msol_swapped = 4;
  uint64 sol_deposited = 5;
  uint64 msol_minted = 6;
  uint64 total_virtual_staked_lamports = 7;
  uint64 msol_supply = 8;
}

message DepositStakeAccountEvent {
  bytes state = 1;
  bytes stake = 2;
  uint64 delegated = 3;
  bytes withdrawer = 4;
  bytes validator = 5;
  uint64 msol_minted = 6;
  uint64 total_virtual_staked_lamports = 7;
  uint64 msol_supply = 8;
}

message LiquidUnstakeEvent {
  bytes state = 1;
  bytes msol_owner = 2;
  uint64 msol_amount = 3;
  uint64 msol_fee = 4;
  uint64 treasury_msol_cut = 5;
  uint64 sol_amount = 6;
}

message AddLiquidityEvent {
  bytes state = 1;
  bytes sol_owner = 2;
  uint64 sol_added_amount = 3;
  uint64 lp_minted = 4;
  uint64 total_virtual_staked_lamports = 5;
  uint64 msol_supply = 6;
}

message RemoveLiquidityEvent {
  bytes state = 1;
  uint64 lp_burned = 2;
  uint64 sol_out_amount = 3;
  uint64 msol_out_amount = 4;
}

message WithdrawStakeAccountEvent {
  bytes state = 1;
  bytes stake = 2;
  bytes validator = 3;
  bytes user_msol_auth = 4;
  uint64 msol_burned = 5;
  uint64 msol_fees = 6;
  bytes beneficiary = 7;
  uint64 split_lamports = 8;
}
