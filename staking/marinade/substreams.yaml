specVersion: v0.1.0
package:
  name: marinade
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: Marinade Finance liquid staking events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/marinade.wasm

protobuf:
  files:
    - v1/marinade.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:MarBmsSgKXdrN1egZf5sqe1TMai9K1rChYNDJgjq7aD"
    output:
      type: proto:marinade.v1.Events

network: solana
