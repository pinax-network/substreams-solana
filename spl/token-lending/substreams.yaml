specVersion: v0.1.0
package:
  name: spl_token_lending
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: SPL Token Lending
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/spl_token_lending.wasm

protobuf:
  files:
    - v1/spl-token-lending.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    doc: SPL Token Lending
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:LendZqTs7gn5CTSJU1jWKhKuVpjJGom45nnwPb2AMTi"
    output:
      type: proto:solana.spl.token_lending.v1.Events

network: solana
