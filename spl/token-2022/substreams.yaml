specVersion: v0.1.0
package:
  name: spl_token_2022
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: SPL Token-2022
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/spl_token_2022.wasm

protobuf:
  files:
    - v1/spl-token.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    doc: SPL Token-2022
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
    output:
      type: proto:solana.spl.token.v1.Events

network: solana
