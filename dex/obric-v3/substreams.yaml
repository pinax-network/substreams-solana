specVersion: v0.1.0
package:
  name: obric-v3
  version: v0.1.0
  url: https://github.com/pinax-network/substreams-svm
  description: Obric v3 DEX events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/obric-v3.wasm

protobuf:
  files:
    - v1/obric-v3.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:ob2wXVFGiWXkPwYv8CSpPMm5m3NR7DjSrVJAHGSb9Gu"
    output:
      type: proto:obric-v3.v1.Events

network: solana
