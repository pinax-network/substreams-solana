specVersion: v0.1.0
package:
  name: drift
  version: v0.1.0
  url: https://github.com/pinax-network/substreams-svm
  description: Drift v2 DEX events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/drift.wasm

protobuf:
  files:
    - v1/drift.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:dRiftyHA39MWEi3m9aunc5MzRF1JYuBsbn6VPcn33UH"
    output:
      type: proto:drift.v1.Events

network: solana
