specVersion: v0.1.0
package:
  name: okx-dex
  version: v0.4.0
  url: https://github.com/pinax-network/substreams-svm
  description: OKX DEX v2 events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/okx-dex.wasm

protobuf:
  files:
    - v1/dex/okx-dex.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:6m2CDdhRgxpH4WjvdzxAYbGxwdGUz5MziiL5jek2kBma"
    output:
      type: proto:okx-dex.v1.Events

network: solana
