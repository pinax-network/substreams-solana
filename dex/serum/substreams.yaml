specVersion: v0.1.0
package:
  name: serum
  version: v0.4.0
  url: https://github.com/pinax-network/substreams-svm
  description: Serum DEX events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/serum.wasm

protobuf:
  files:
    - v1/dex/serum.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:9xQeWvG816bUx9EPjHmaT23yvVM2ZWbrrpZb9PusVFin"
    output:
      type: proto:serum.v1.Events

network: solana
