specVersion: v0.1.0
package:
  name: aldrin
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: Aldrin DEX events for Solana.
  image: ../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/aldrin.wasm

protobuf:
  files:
    - v1/dex/aldrin.proto
  importPaths:
    - ../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:CURVGoZn8zycx6FXwwevgBTB2gVvdbGTEpvMJDbgs2t4"
    output:
      type: proto:aldrin.v1.Events

network: solana
