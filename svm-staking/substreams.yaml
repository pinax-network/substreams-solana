specVersion: v0.1.0
package:
  name: svm_staking
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: Native & Liquid staking protocols for Solana.
  image: ../image.png

imports:
  # SQL Sink Substreams
  database_changes: ../spkg/substreams-sink-database-changes-v4.0.0.spkg
  sql: ../spkg/substreams-sink-sql-protodefs-v1.0.7.spkg

  # Staking
  marinade: ../staking/marinade/substreams.yaml
  native_stake: ../native/stake/substreams.yaml

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/db_svm_staking.wasm

modules:
  - name: db_out
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: marinade:map_events
      - map: native_stake:map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: solana
