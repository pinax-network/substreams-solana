specVersion: v0.1.0
package:
  name: magiceden_m3
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: Magic Eden M3 NFT AMM events for Solana.
  image: ../../../image.png

imports:
  solana_common: https://github.com/streamingfast/substreams-foundational-modules/releases/download/substreams-v0.3.3/solana-common-v0.3.3.spkg

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../../target/wasm32-unknown-unknown/release/magiceden_m3.wasm

protobuf:
  files:
    - v1/nft/magiceden-m3.proto
  importPaths:
    - ../../../proto

modules:
  - name: map_events
    kind: map
    inputs:
      - map: solana_common:blocks_without_votes
    blockFilter:
      module: solana_common:program_ids_without_votes
      query:
        string: "program:mmm3XBJg5gk8XJxEKBvdgptZz6SgK4tXvn36sodowMc"
    output:
      type: proto:magiceden.m3.v1.Events

network: solana
