specVersion: v0.1.0
package:
  name: svm_nfts
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: NFT Marketplaces for Solana.
  image: ../image.png

imports:
  # SQL Sink Substreams
  database_changes: ../spkg/substreams-sink-database-changes-v4.0.0.spkg
  sql: ../spkg/substreams-sink-sql-protodefs-v1.0.7.spkg

  # NFT Marketplaces
  magiceden_m2: ../nft/magiceden/m2/substreams.yaml
  magiceden_m3: ../nft/magiceden/m3/substreams.yaml
  tensor: ../nft/tensor/substreams.yaml

binaries:
  default:
    type: wasm/rust-v1
    file: ../target/wasm32-unknown-unknown/release/db_svm_nfts.wasm

modules:
  - name: db_out
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: magiceden_m2:map_events
      - map: magiceden_m3:map_events
      - map: tensor:map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: solana
