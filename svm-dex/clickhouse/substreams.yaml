specVersion: v0.1.0
package:
  name: svm_clickhouse_dex
  version: v1.0.0
  url: https://github.com/pinax-network/substreams-svm
  description: DEXs for Solana (ClickHouse).
  image: ../../image.png

imports:
  db: ../substreams.yaml

modules:
  - name: db_out
    use: db:db_out

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    engine: clickhouse
    postgraphile_frontend:
      enabled: false

network: solana
